# ============================================
# DeepTutor Docker Compose Configuration
# ============================================
# This file provides orchestration for DeepTutor services
#
# Usage:
#   Production:  python scripts/docker_compose.py up -d
#   Development: python scripts/docker_compose.py -f docker-compose.yml -f docker-compose.dev.yml up
#   Build only:  python scripts/docker_compose.py build
#   Quick start: docker compose up -d
#
# Prerequisites:
#   1. Runtime settings are stored in ./data/user/settings (created automatically)
#   2. Configure model providers from the web Settings page or model_catalog.json
#   3. Use scripts/docker_compose.py so port mappings are rendered from system.json
#
# LiteRT-LM bridge (on-device Gemma):
#   The model is downloaded automatically on first startup.
#   Set LITERTLM_MODEL_PATH in .env to override the default location.
# Local LLM (LM Studio / Ollama / vLLM):
#   Use "host.docker.internal" instead of "localhost" in provider base_url fields.
#   Configure provider endpoints in data/user/settings/model_catalog.json or the UI.
# ============================================

services:
  # ============================================
  # LiteRT-LM Bridge — on-device Gemma-4 E2B model server
  # Exposes an OpenAI-compatible API on port 8000 inside the network.
  # Downloads the model automatically on first startup if not present.
  # ============================================
  litertlm:
    image: python:3.12-slim
    container_name: litertlm
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./litertlm:/app
      # Mount the existing data/models directory for model persistence
      - ./data/models:/models
    environment:
      - LITERTLM_MODEL_PATH=/models/gemma-4-E2B-it.litertlm
      - LITERTLM_HOST=0.0.0.0
      - LITERTLM_PORT=8000
      - LITERTLM_MODEL_ID=gemma-4-E2B-it
      - LITERTLM_LOG_LEVEL=INFO
    command: >
      sh -c "
        apt-get update -qq && apt-get install -y --no-install-recommends curl &&
        chmod +x /app/start.sh &&
        /app/start.sh
      "
    ports:
      - "8000:8000"
    networks:
      - deeptutor-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s  # 5 minutes for model download + startup

  # ============================================
  # PocketBase — optional auth + storage sidecar
  # Set integrations.pocketbase_url=http://pocketbase:8090 to activate.
  # Leave integrations.pocketbase_url blank to run without PocketBase (SQLite fallback).
  # ============================================
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: pocketbase
    restart: unless-stopped
    ports:
      - "${DEEPTUTOR_DOCKER_POCKETBASE_PORT:-8090}:8090"
    volumes:
      - ./data/pocketbase:/pb/pb_data
    networks:
      - deeptutor-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ============================================
  # All-in-One DeepTutor Service
  # ============================================
  deeptutor:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: deeptutor
    restart: unless-stopped
    ports:
      - "${DEEPTUTOR_DOCKER_BACKEND_PORT:-8001}:${DEEPTUTOR_DOCKER_BACKEND_PORT:-8001}"
      - "${DEEPTUTOR_DOCKER_FRONTEND_PORT:-3782}:${DEEPTUTOR_DOCKER_FRONTEND_PORT:-3782}"

    volumes:
      # Mount local data directory for persistence (read-write)
      # This includes runtime settings under ./data/user/settings.
      - ./data/user:/app/data/user
      - ./data/memory:/app/data/memory
      - ./data/knowledge_bases:/app/data/knowledge_bases
      # Mount models directory so backend can detect downloaded .litertlm files
      - ./data/models:/app/data/models

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${DEEPTUTOR_DOCKER_BACKEND_PORT:-8001}/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    depends_on:
      pocketbase:
        condition: service_healthy
      litertlm:
        condition: service_started

    networks:
      - deeptutor-network

# ============================================
# Networks
# ============================================
networks:
  deeptutor-network:
    driver: bridge
